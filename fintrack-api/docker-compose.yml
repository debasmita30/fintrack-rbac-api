version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FinTrack API - Docker Compose
#
# Usage:
#   docker compose up            — starts the API (uses SQLite by default)
#   docker compose --profile pg up — starts API + PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: file:./prod.db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_in_production}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    volumes:
      - db_data:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Optional: PostgreSQL profile ──────────────────────────────────────────
  postgres:
    profiles: ["pg"]
    image: postgres:16-alpine
    container_name: fintrack-postgres
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: fintrack_user
      POSTGRES_PASSWORD: fintrack_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack_user -d fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  pg_data:
